name: Deploy Documentation

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Install doc2go
        run: go install go.abhg.dev/doc2go@latest

      - name: Generate API reference
        run: |
          doc2go -home github.com/dakolli/opencode-go-kit ./pkg/api/...

      - name: Apply custom styles
        run: cp .github/docs-custom.css _site/_/css/main.css

      - name: Upload pages
        uses: actions/upload-pages-artifact@v3
        with:
          # doc2go automatically puts the fully styled site here
          path: '_site'

  publish:
    name: Publish website
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4