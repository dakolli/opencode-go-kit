name: Deploy Documentation

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build website
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Install doc2go
        run: go install go.abhg.dev/doc2go@latest

      - name: Generate API reference
        # We pass your root module path to -home. doc2go automatically 
        # outputs everything into a directory called "_site"
        run: |
          doc2go -home github.com/dakolli/opencode-go-kit ./...

      - name: Upload pages
        uses: actions/upload-pages-artifact@v3
        with:
          # doc2go automatically puts the fully styled site here
          path: '_site'

  publish:
    name: Publish website
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4